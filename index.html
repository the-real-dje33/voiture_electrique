<!-- ========================= index.html ========================= -->
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comparateur Voitures</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="app">
  <h1>🚗 Comparateur de coût</h1>
  <p class="subtitle">Électrique vs Thermique sur plusieurs années</p>

  <div class="container">
    <div class="card">
      <h2>⚡ Électrique</h2>
      <input id="prix_elec" placeholder="Prix (€)">
      <input id="conso_elec" placeholder="kWh / 100km">
      <input id="energie_elec" placeholder="€/kWh">
      <input id="revision_elec" placeholder="Révision / an">
      <input id="assurance_elec" placeholder="Assurance / an">
      <input id="aide_elec" placeholder="Aides (€)">
    </div>

    <div class="card">
      <h2>⛽ Thermique</h2>
      <input id="prix_therm" placeholder="Prix (€)">
      <input id="conso_therm" placeholder="L / 100km">
      <input id="energie_therm" placeholder="€/L">
      <input id="revision_therm" placeholder="Révision / an">
      <input id="assurance_therm" placeholder="Assurance / an">
      <input id="aide_therm" placeholder="Aides (€)">
    </div>
  </div>

  <div class="controls">
    <input id="km" placeholder="Km / an">
    <input id="duree" placeholder="Durée (années)">

    <div class="buttons">
      <button id="btnCalcul">Calculer</button>
      <button id="btnReset" class="secondary">Reset</button>
    </div>
  </div>

  <div class="results">
    <p id="result_elec"></p>
    <p id="result_therm"></p>
    <p id="rentabilite"></p>
    <p id="error" class="error"></p>
  </div>

  <canvas id="chart"></canvas>
</div>

<script src="script.js"></script>
</body>
</html>
